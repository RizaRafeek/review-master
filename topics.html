<html>
<head>
    <title>Complete Topics</title>
    <meta charset ="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id ="back-button" class = "button">back</button>
    <ul id ="list"></ul>
    <script>
        fetch("http://127.0.0.1:8000/topics").then(res => res.json())
        .then(data => {
            const list = document.getElementById("list")
            data.forEach(topic =>{
                const li = document.createElement("li")
                const parts = topic.next_review_date.split("-")
                const formatted = parts[2] + "-" + parts[1] + "-" + parts[0]
                const nameSpan = document.createElement("span")
                nameSpan.innerText = topic.name
                const dateSpan = document.createElement("span")
                dateSpan.innerText = formatted
                li.appendChild(nameSpan)
                li.appendChild(dateSpan)
                list.appendChild(li)
            })
        })
        const backButton = document.getElementById("back-button")
        backButton.onclick = () => {
            window.location.href = "index.html"
        }
    </script>
</body>
</html>
